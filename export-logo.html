<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Export Laksh Logo</title></head>
<body style="background:#0b1120;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;margin:0;font-family:sans-serif;color:white;">
  <canvas id="c" width="512" height="512" style="border:1px solid #333;border-radius:16px;"></canvas>
  <button id="btn" style="margin-top:20px;padding:12px 28px;background:#00d4aa;color:#000;border:none;border-radius:24px;font-size:15px;font-weight:700;cursor:pointer;">Download PNG</button>
  <script>
    const SVG = `<svg viewBox="0 0 100 78" fill="none" xmlns="http://www.w3.org/2000/svg" width="512" height="512">
      <defs>
        <linearGradient id="lk-g" x1="50" y1="5" x2="50" y2="73" gradientUnits="userSpaceOnUse">
          <stop offset="0%"   stop-color="#6ee7b7" />
          <stop offset="45%"  stop-color="#2dd4bf" />
          <stop offset="100%" stop-color="#38bdf8" />
        </linearGradient>
      </defs>
      <path d="M 23 20 L 5 54 L 27 62 L 36 46" stroke="url(#lk-g)" stroke-width="3.8" stroke-linejoin="round" stroke-linecap="round"/>
      <path d="M 77 20 L 95 54 L 73 62 L 64 46" stroke="url(#lk-g)" stroke-width="3.8" stroke-linejoin="round" stroke-linecap="round"/>
      <path d="M 50 6 L 36 46 L 50 56 L 64 46 Z" stroke="url(#lk-g)" stroke-width="3.8" stroke-linejoin="round" stroke-linecap="round"/>
      <path d="M 27 62 Q 38 52 50 56 Q 62 52 73 62" stroke="url(#lk-g)" stroke-width="3.8" stroke-linejoin="round" stroke-linecap="round"/>
      <path d="M 50 56 L 43 64 L 50 72 L 57 64 Z" stroke="url(#lk-g)" stroke-width="3.4" stroke-linejoin="round" stroke-linecap="round"/>
    </svg>`;

    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    // Dark background
    ctx.fillStyle = '#0b1120';
    ctx.fillRect(0, 0, 512, 512);

    const blob = new Blob([SVG], {type: 'image/svg+xml'});
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => {
      // Center the logo with some padding
      const pad = 64;
      ctx.drawImage(img, pad, pad + 20, 512 - pad*2, 512 - pad*2 - 20);
      URL.revokeObjectURL(url);
    };
    img.src = url;

    document.getElementById('btn').onclick = () => {
      const a = document.createElement('a');
      a.download = 'laksh-logo-512.png';
      a.href = canvas.toDataURL('image/png');
      a.click();
    };
  </script>
</body>
</html>
